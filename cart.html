<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>

    <!-- header>.logo+nav>a*2^.cart>a{Cart} -->
     <header>
        <div class="logo">OZON</div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="products.html">Товары</a>
        </nav>
        <div class="cart">
            <a href="cart.html">Корзина</a>
        </div>
     </header>
    
     <main>
        <div class="container">

            <div class="cart-container">                
                <div class="cart-elements">
                    <!-- .cart-el>.cart-el-top>img.cart-el-img+.cart-el-text^.cart-el-btns>button.cart-el-delete+button.cart-el-buy -->
                    <div class="cart-el">
                        <div class="cart-el-top">
                            <img src="laptop_PNG5939.png" alt="КАРТИНКА" class="cart-el-img">
                            <div class="cart-el-text">
                                <p class="cart-el-price">$1307</p>
                                <p class="cart-el-title">Ноутбук RTX3060 Intel Core i5 38900F</p>
                            </div>
                        </div>
                        <div class="cart-el-btns">
                            <button class="cart-el-delete">Удалить</button>
                            <button class="cart-el-buy">Купить</button>
                        </div>
                    </div>
                </div>
                <div class="summary">
                    <!-- .summary-header+.summary-info>p.summary-prod+p.summary-price^button.summary-buy -->
                    <div class="summary-header">ИТОГО:</div>
                    <div class="summary-info">
                        <p class="summary-prod">Товары:</p>
                        <p class="summary-price">$1307</p>
                    </div>
                    <button class="summary-buy">Купить всё</button>
                </div>
            </div>

        </div>
     </main>

    <script type="module" src="main.js"></script>
</body>
</html>
